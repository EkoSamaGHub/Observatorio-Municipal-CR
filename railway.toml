# ── API service (web) ───────────────────────────────────────────
# This is the default service deployed by Railway when you connect the repo.
# Start command: uvicorn api.main:app --host 0.0.0.0 --port $PORT

[build]
builder = "nixpacks"

[deploy]
startCommand = "sh -c 'if [ -n \"$WORKER_MODE\" ]; then python -u worker.py; else uvicorn api.main:app --host 0.0.0.0 --port $PORT; fi'"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"

# ── Crawler worker service ───────────────────────────────────────
# Add a SECOND Railway service from the same repo with:
#   Start command: python -u worker.py
#   No healthcheck (it's a worker, not a web server)
#   Restart policy: on_failure
#
# Required environment variables (same as the API service):
#   DATABASE_URL  — Postgres connection string (TigerData / Railway Postgres)
#
# The worker (task-queue architecture):
#   1. Reaps orphaned runs and runs a background reaper that requeues tasks
#      abandoned by crashed workers (incl. timed-out GitHub Actions jobs).
#   2. Runs ONE bounded discover pass for unindexed municipalities — broken
#      sites become 'dead' after max_attempts instead of being retried forever.
#   3. Then performs periodic monitor passes (every 6h).
# Canonical large discovery sweeps run in GitHub Actions (.github/workflows/
# crawl.yml) as parallel queue workers; Railway primarily serves the API.
