name: Nightly Crawl

on:
  schedule:
    # 02:00 UTC = 20:00 CR — full discover pass on every active municipality.
    - cron: "0 2 * * *"
    # 14:00 UTC = 08:00 CR — only-missing sweep for municipalities not yet indexed.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Crawl mode"
        required: false
        default: "discover"
        type: choice
        options:
          - discover
          - monitor
      max_pages:
        description: "Max pages per municipality"
        required: false
        default: "500"
      only_missing:
        description: "Discover only municipalities not yet indexed"
        type: boolean
        default: false

concurrency:
  group: crawl
  cancel-in-progress: false

# ── Platform architecture ──────────────────────────────────────────────────────
# 1) enqueue  — submits one crawl job per municipality to the crawler-platform API.
#               Outputs job_map JSON ({muni_id: job_id}).
# 2) sync     — polls the platform until all jobs reach a terminal state,
#               then syncs page results into the Observatory's Postgres DB.
#               The platform handles all crawl parallelism via its own workers.
#
# Requirements:
#   DATABASE_URL      — Observatory's Postgres (GHA secret)
#   PLATFORM_API_URL  — Deployed crawler-platform URL (GHA secret)

env:
  PYTHON_VERSION: "3.11"

jobs:
  enqueue:
    name: "Submit crawl jobs"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PLATFORM_API_URL: ${{ secrets.PLATFORM_API_URL }}
    outputs:
      job_map: ${{ steps.enq.outputs.job_map }}
      count: ${{ steps.enq.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - id: enq
        name: Submit jobs to platform
        run: |
          MODE="${{ github.event.inputs.mode || 'discover' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '500' }}"
          ONLY_MISSING=""
          if [ "${{ github.event.inputs.only_missing }}" = "true" ] \
             || [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
            ONLY_MISSING="--only-missing"
          fi
          python crawler_cli.py enqueue \
            --mode "$MODE" \
            --max-pages "$MAX_PAGES" \
            $ONLY_MISSING

  sync:
    name: "Wait & sync results"
    needs: enqueue
    if: needs.enqueue.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PLATFORM_API_URL: ${{ secrets.PLATFORM_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Poll jobs and sync results
        run: |
          python crawler_cli.py work \
            --job-map '${{ needs.enqueue.outputs.job_map }}' \
            --timeout 18000 \
            --poll-interval 60
      - name: Final status
        if: always()
        run: |
          python crawler_cli.py progress \
            --job-map '${{ needs.enqueue.outputs.job_map }}'
