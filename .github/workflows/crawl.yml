name: Nightly Crawl

on:
  schedule:
    # 02:00 UTC daily (10pm Costa Rica time, CR is UTC-6)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Crawl mode"
        required: false
        default: "discover"
        type: choice
        options:
          - discover
          - monitor
      max_pages:
        description: "Max pages per municipality"
        required: false
        default: "200"
      only_missing:
        description: "discover only municipalities not yet indexed"
        type: boolean
        default: false

concurrency:
  group: crawl
  cancel-in-progress: false

# ── Task-queue architecture ───────────────────────────────────────────────────
# 1) enqueue  — one producer creates a run + one task per municipality.
# 2) work     — N parallel workers claim tasks (Postgres FOR UPDATE SKIP LOCKED).
#               A worker that times out simply stops; its in-flight task's lease
#               expires and another run (or the Railway reaper) reclaims it.
# 3) finalize — reap requeues abandoned tasks, marks exhausted ones dead, and
#               finalizes the run once every task is terminal.
# Workers are idempotent and resumable, so the sweep is fault-tolerant and the
# whole 84-muni run parallelises cleanly instead of running ~17h serially.

env:
  PYTHON_VERSION: "3.11"

jobs:
  enqueue:
    name: "Enqueue run"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    outputs:
      run_id: ${{ steps.enq.outputs.run_id }}
      count: ${{ steps.enq.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - id: enq
        name: Enqueue tasks
        run: |
          MODE="${{ github.event.inputs.mode || 'discover' }}"
          ONLY_MISSING=""
          if [ "${{ github.event.inputs.only_missing }}" = "true" ]; then
            ONLY_MISSING="--only-missing"
          fi
          python crawler_cli.py enqueue --mode "$MODE" $ONLY_MISSING

  work:
    name: "Worker ${{ matrix.worker }}"
    needs: enqueue
    if: needs.enqueue.outputs.run_id != ''
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      # 2 workers keeps peak concurrent DB connections well under Timescale's
      # limit (workers + Railway API + reaper share one pool). Raising this risks
      # exhausting connections and hanging the API/SSR.
      matrix:
        worker: [1, 2]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Work the queue
        run: |
          MAX_PAGES="${{ github.event.inputs.max_pages || '200' }}"
          python crawler_cli.py work \
            --run-id ${{ needs.enqueue.outputs.run_id }} \
            --worker-id "gha-${{ github.run_id }}-${{ matrix.worker }}" \
            --time-budget 3000 \
            --max-pages "$MAX_PAGES" \
            --delay 1.0

  finalize:
    name: "Finalize run"
    needs: [enqueue, work]
    if: always() && needs.enqueue.outputs.run_id != ''
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Reap + finalize
        run: python crawler_cli.py reap --run-id ${{ needs.enqueue.outputs.run_id }}
